name: Deploy Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer

      - name: Check PHP version
        run: php -v

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.1'
          cache: npm

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Deploy built assets via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.ALL_FTP_HOST }}
          username: ${{ secrets.PROD_FTP_USER }}
          password: ${{ secrets.ALL_FTP_PASS }}
          protocol: ftp
          port: ${{ secrets.ALL_FTP_PORT }}
          local-dir: ./public/build/
          server-dir: ${{ secrets.PROD_FTP_DEPLOY_PATH }}/public/build/

      - name: Run Server Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALL_SSH_HOST }}
          username: ${{ secrets.ALL_SSH_USER }}
          port: ${{ secrets.ALL_SSH_PORT }}
          key: ${{ secrets.ALL_SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.PROD_SSH_DEPLOY_PATH }}

            php -v

            # Forzar el servidor a quedar exactamente igual que origin/main
            mkdir -p ~/.ssh
            ssh-keygen -R github.com || true
            ssh-keyscan github.com >> ~/.ssh/known_hosts

            git fetch --force origin main --tags
            git reset --hard ${{ github.sha }}

            # Limpiar archivos no versionados sin borrar archivos/directorios necesarios
            git clean -fd \
              -e .env \
              -e storage/ \
              -e public/build/ \
              -e index.php \
              -e .htaccess \
              -e public/.htaccess

            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            php artisan migrate --force

            php artisan optimize:clear
            php artisan optimize

            chmod -R 775 storage bootstrap/cache
